name: Instagram Auto-Post

on:
  schedule:
    - cron: '*/15 * * * *'  # Alle 15 Minuten prüfen
  workflow_dispatch:          # Manuell auslösbar

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Instagram Beiträge posten
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_ID: ${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET: ${{ secrets.INSTAGRAM_APP_SECRET }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: node instagram-post.js

      - name: Änderungen committen (gepostete Ordner verschieben)
        run: |
          git config user.name "Instagram Bot"
          git config user.email "bot@strohhalmwerk.de"
          git add Instagram/
          git diff --staged --quiet || git commit -m "Auto: Instagram-Beitrag veröffentlicht"
          git push
